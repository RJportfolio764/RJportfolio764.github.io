<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Jobs Market Dashboard Preview — Rayyan Junaid</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      background: #0A0A0F;
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
      padding: 32px;
    }
    .shell {
      max-width: 1220px;
      margin: 0 auto;
    }
    a {
      color: #8B5CF6;
      text-decoration: none;
      font-weight: 700;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      letter-spacing: -0.5px;
    }
    p {
      color: #888899;
      margin-top: 6px;
    }
    .frame {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      background: #11111A;
      box-shadow: 0 40px 80px rgba(0,0,0,0.55);
    }
    img {
      width: 100%;
      display: block;
    }
    @media (max-width: 700px) {
      body { padding: 18px; }
      .top { align-items: flex-start; flex-direction: column; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div>
        <h1>AI Jobs Market Dashboard Preview</h1>
        <p>Static preview from Project 1.</p>
      </div>
      <a href="./">Back to case study</a>
    </div>
    <div class="frame">
      <img src="screenshots/dashboard-final.png" alt="AI Jobs Market dashboard preview">
    </div>
  </main>
</body>
</html>
